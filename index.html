<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的DeepSeek智能助手</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 头部标题 */
        .chat-header {
            background: #ffffff;
            padding: 16px 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-header h1 {
            font-size: 1.25rem;
            margin: 0;
            color: #333;
        }
        .new-chat-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        /* 聊天记录区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        /* 通用消息气泡样式 */
        .message {
            display: flex;
            max-width: 85%;
        }
        .user-message {
            align-self: flex-end;
        }
        .bot-message {
            align-self: flex-start;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.4;
            word-break: break-word;
            font-size: 0.95rem;
        }
        .user-message .bubble {
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot-message .bubble {
            background: #ffffff;
            color: #222;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        /* 输入区域 */
        .chat-input-area {
            background: #ffffff;
            padding: 12px 16px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .chat-input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 1rem;
            outline: none;
        }
        .chat-input-area button {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .loading-dots {
            color: #666;
            font-size: 0.9rem;
            padding: 5px 0;
        }
        .error-msg {
            color: #d32f2f;
            background: #ffebee;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="chat-header">
    <h1>🤖 DeepSeek 助手</h1>
    <button class="new-chat-btn" id="newChatBtn">✨ 新对话</button>
</div>

<div class="chat-messages" id="chatMessages">
    <div class="message bot-message">
        <div class="bubble">你好呀！我是DeepSeek助手，有什么可以帮你的吗？😊</div>
    </div>
</div>

<div class="chat-input-area">
    <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off">
    <button id="sendBtn">发送</button>
</div>

<script>
    // ----------------------------- 配置区域 ---------------------------------
    // 请在这里填入你的真实 API Key
    const API_KEY = 'sk-fd Oa4029a86c47a79a40e3015e1d4dc1';
    const API_URL = 'https://api.deepseek.com/chat/completions';
    
    // 存储对话历史 (只保留最近10轮，节省token，也保证不会超出长度)
    let conversationHistory = [];
    
    // 获取DOM元素
    const messagesContainer = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    
    // 辅助函数：添加消息到界面
    function addMessageToUI(content, role) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        // 简单处理换行
        bubble.innerHTML = content.replace(/\n/g, '<br>');
        
        messageDiv.appendChild(bubble);
        messagesContainer.appendChild(messageDiv);
        // 自动滚动到底部
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    // 显示临时"正在输入"状态
    let loadingIndicator = null;
    function showTyping() {
        if (loadingIndicator) loadingIndicator.remove();
        const div = document.createElement('div');
        div.className = 'message bot-message';
        div.id = 'typingIndicator';
        div.innerHTML = '<div class="bubble loading-dots">正在思考<span>.</span><span>.</span><span>.</span></div>';
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    function hideTyping() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
        loadingIndicator = null;
    }
    
    // 显示错误信息
    function showError(msg) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'message bot-message';
        errorDiv.innerHTML = `<div class="bubble error-msg">⚠️ ${msg}</div>`;
        messagesContainer.appendChild(errorDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    // 核心：调用 DeepSeek API
    async function callDeepSeekAPI(userMessage) {
        // 先把用户消息加入历史记录（界面已显示，现在存入内存）
        conversationHistory.push({ role: "user", content: userMessage });
        
        // 为了避免历史太长导致 token 溢出，只保留最近 10 条消息（约5轮对话）
        // 注意：这里会保留 system 消息，但我们没有 system，所以直接 slice
        if (conversationHistory.length > 10) {
            conversationHistory = conversationHistory.slice(-10);
        }
        
        // 准备请求体
        const payload = {
            model: "deepseek-chat",
            messages: conversationHistory,   // 直接发送历史记录
            stream: false,                  // 为了简单，不使用流式输出
            temperature: 0.7,
            max_tokens: 2048
        };
        
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify(payload)
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                let errorMsg = `API请求失败 (${response.status})`;
                if (errorData.error && errorData.error.message) {
                    errorMsg = errorData.error.message;
                }
                throw new Error(errorMsg);
            }
            
            const data = await response.json();
            // 提取回复内容
            const assistantReply = data.choices[0].message.content;
            
            // 将 AI 回复也存入历史
            conversationHistory.push({ role: "assistant", content: assistantReply });
            // 再次修剪历史，防止意外超长
            if (conversationHistory.length > 10) {
                conversationHistory = conversationHistory.slice(-10);
            }
            
            return assistantReply;
            
        } catch (error) {
            console.error("调用API出错:", error);
            throw error;
        }
    }
    
    // 发送消息的主流程
    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;
        
        // 清空输入框
        userInput.value = '';
        // 在界面显示用户消息
        addMessageToUI(message, 'user');
        
        // 显示加载动画
        showTyping();
        
        try {
            // 调用 API
            const reply = await callDeepSeekAPI(message);
            // 隐藏加载动画
            hideTyping();
            // 显示 AI 回复
            addMessageToUI(reply, 'assistant');
        } catch (err) {
            hideTyping();
            console.error(err);
            // 如果是密钥错误，给出友好提示
            if (err.message.includes("API key") || err.message.includes("401") || err.message.includes("Incorrect")) {
                showError("API Key 无效或已过期，请检查代码中的密钥配置。");
            } else {
                showError(`网络或服务出错: ${err.message}`);
            }
            // 注意：因为调用失败，之前存入历史的那条 user 消息需要移除，避免重复提问时混乱
            // 但用户界面上已经显示了，我们就从历史里删掉最后一条（用户消息）
            if (conversationHistory.length > 0 && conversationHistory[conversationHistory.length-1].role === 'user') {
                conversationHistory.pop();
            }
        }
    }
    
    // 重置对话（开始新对话）
    function resetConversation() {
        conversationHistory = [];
        // 清空聊天区域，只保留一条欢迎消息
        messagesContainer.innerHTML = '';
        const welcomeDiv = document.createElement('div');
        welcomeDiv.className = 'message bot-message';
        welcomeDiv.innerHTML = '<div class="bubble">✨ 新对话已开始！有什么我可以帮你的吗？</div>';
        messagesContainer.appendChild(welcomeDiv);
        // 可选: 加一条小小的提示表示上下文已清空
    }
    
    // 绑定事件
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    newChatBtn.addEventListener('click', resetConversation);
    
    // 页面加载完毕后的额外检查
    if (!API_KEY || API_KEY === '你的-API-Key') {
        showError("⚠️ 请先在代码中配置你的 DeepSeek API Key！");
    }
</script>
</body>
</html>
