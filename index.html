<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek智能助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: #ffffff;
            padding: 16px 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.25rem;
            color: #333;
        }

        .new-btn {
            background: #10a37f;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            max-width: 85%;
        }

        .user {
            align-self: flex-end;
        }

        .bot {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.4;
            word-break: break-word;
            font-size: 0.95rem;
        }

        .user .bubble {
            background: #10a37f;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: #ffffff;
            color: #222;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        /* 输入区域 */
        .input-area {
            background: #ffffff;
            padding: 12px 16px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: #10a37f;
        }

        .input-area button {
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0 22px;
            font-weight: bold;
            cursor: pointer;
        }

        .typing {
            color: #888;
            font-size: 0.85rem;
            padding: 8px 12px;
        }

        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🤖 DeepSeek 助手</h1>
    <button class="new-btn" id="newBtn">✨ 新对话</button>
</div>

<div class="chat-area" id="chatArea">
    <div class="message bot">
        <div class="bubble">你好！我是 DeepSeek 助手，有什么可以帮你的吗？😊</div>
    </div>
</div>

<div class="input-area">
    <input type="text" id="inputBox" placeholder="输入消息..." autocomplete="off">
    <button id="sendBtn">发送</button>
</div>

<script>
    // ============================================================
    // ⚠️ 请在这里填入你的 DeepSeek API Key
    // ============================================================
    const API_KEY = 'sk-fdOa4029a86c47a79a40e3015e1d4dc1';   // 👈 改成你的真实密钥，比如 sk-xxxxxxxxxxxxx
    
    const API_URL = 'https://api.deepseek.com/chat/completions';
    
    // 对话历史（最多保留10条，约5轮对话）
    let history = [];
    
    // DOM 元素
    const chatArea = document.getElementById('chatArea');
    const inputBox = document.getElementById('inputBox');
    const sendBtn = document.getElementById('sendBtn');
    const newBtn = document.getElementById('newBtn');
    
    // 添加消息到界面
    function addMessage(content, role) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'user' : 'bot'}`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = content.replace(/\n/g, '<br>');
        
        msgDiv.appendChild(bubble);
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    
    // 显示/隐藏"正在输入"
    let typingDiv = null;
    function showTyping() {
        if (typingDiv) typingDiv.remove();
        typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.innerHTML = '<div class="bubble typing">🤔 正在思考...</div>';
        chatArea.appendChild(typingDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    function hideTyping() {
        if (typingDiv) {
            typingDiv.remove();
            typingDiv = null;
        }
    }
    
    // 显示错误
    function showError(msg) {
        const errDiv = document.createElement('div');
        errDiv.className = 'message bot';
        errDiv.innerHTML = `<div class="bubble error">⚠️ ${msg}</div>`;
        chatArea.appendChild(errDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    
    // 调用 DeepSeek API
    async function callDeepSeek(userMsg) {
        // 把用户消息加入历史
        history.push({ role: 'user', content: userMsg });
        // 保留最近10条
        if (history.length > 10) history = history.slice(-10);
        
        const payload = {
            model: 'deepseek-chat',
            messages: history,
            stream: false,
            temperature: 0.7,
            max_tokens: 2048
        };
        
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
            const err = await response.json();
            let msg = `请求失败 (${response.status})`;
            if (err.error?.message) msg = err.error.message;
            throw new Error(msg);
        }
        
        const data = await response.json();
        const reply = data.choices[0].message.content;
        
        // 保存AI回复到历史
        history.push({ role: 'assistant', content: reply });
        if (history.length > 10) history = history.slice(-10);
        
        return reply;
    }
    
    // 发送消息主流程
    async function sendMessage() {
        const text = inputBox.value.trim();
        if (!text) return;
        
        inputBox.value = '';
        addMessage(text, 'user');
        showTyping();
        
        try {
            const reply = await callDeepSeek(text);
            hideTyping();
            addMessage(reply, 'bot');
        } catch (err) {
            hideTyping();
            console.error(err);
            if (err.message.includes('API key') || err.message.includes('401') || err.message.includes('Incorrect')) {
                showError('API Key 无效，请检查代码中的密钥是否正确');
            } else {
                showError(`错误：${err.message}`);
            }
            // 移除刚才加入历史的那条用户消息
            if (history.length > 0 && history[history.length-1].role === 'user') {
                history.pop();
            }
        }
    }
    
    // 新对话（清空历史）
    function newConversation() {
        history = [];
        chatArea.innerHTML = '';
        const welcome = document.createElement('div');
        welcome.className = 'message bot';
        welcome.innerHTML = '<div class="bubble">✨ 新对话开始啦！有什么想问的吗？</div>';
        chatArea.appendChild(welcome);
    }
    
    // 绑定事件
    sendBtn.addEventListener('click', sendMessage);
    inputBox.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    newBtn.addEventListener('click', newConversation);
    
    // 检查API Key是否配置
    if (!API_KEY || API_KEY === '你的-API-Key') {
        showError('⚠️ 请先在代码中填入你的 DeepSeek API Key');
    }
</script>
</body>
</html>
